<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA Manba'ul Huda Al-Mubarok</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#0f172a;
    color:white;
}

header {
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

.menu-btn {
    font-size:28px;
    cursor:pointer;
}

.menu {
    position:fixed;
    top:0;
    right:-100%;
    width:70%;
    height:100%;
    background:#064e3b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.4s;
}

.menu a {
    color:white;
    text-decoration:none;
    font-size:22px;
    margin:15px;
}

.menu.active {
    right:0;
}

.hero {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(to right,#064e3b,#065f46);
}

.hero h1 {
    font-size:32px;
}

.section {
    padding:80px 20px;
    text-align:center;
}

img {
    max-width:200px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<div>MAMHALMUBAROK</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
<a href="#">Beranda</a>
<a href="#">Profil</a>
<a href="#">Galeri</a>
<a href="#">Kontak</a>
</div>

<section class="hero">
<h1>MA Manba'ul Huda Al-Mubarok</h1>
</section>

<section class="section">
<h2>Kepala Madrasah</h2>
<p>Lukman Hakim K., S.Pd</p>
</section>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
